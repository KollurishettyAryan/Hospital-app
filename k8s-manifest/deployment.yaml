apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-app
  labels:
    app: hospital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hospital
  template:
    metadata:
      labels:
        app: hospital
    spec:
      containers:
        - name: hospital-container
          image: aryankollurishetty/hospital-app:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
